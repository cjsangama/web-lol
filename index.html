<!DOCTYPE html>
<html>

<head>
<title>Buscador de Campeones LoL</title>

<style>

body{
background:#0a0a0f;
color:#d4af37;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
width:300px;
margin-top:20px;
border-radius:5px;
border:none;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
}

.card{
background:#111;
border-radius:10px;
width:250px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.card img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Buscador de Campeones LoL</h1>

<input type="text" id="search" placeholder="Buscar campeón...">

<div class="container" id="champions"></div>

<script>

const container = document.getElementById("champions")
const search = document.getElementById("search")

let championsData = []

async function loadChampions(){

let response = await fetch("https://ddragon.leagueoflegends.com/cdn/13.24.1/data/en_US/champion.json")

let data = await response.json()

championsData = Object.values(data.data)

displayChampions(championsData)

}

function displayChampions(champions){

container.innerHTML=""

champions.forEach(champion => {

let card = document.createElement("div")

card.classList.add("card")

card.innerHTML = `
<h2>${champion.name}</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/${champion.id}_0.jpg">
`

container.appendChild(card)

})

}

search.addEventListener("keyup", function(){

let text = search.value.toLowerCase()

let filtered = championsData.filter(champion =>
champion.name.toLowerCase().includes(text)
)

displayChampions(filtered)

})

loadChampions()

</script>

</body>

</html>
