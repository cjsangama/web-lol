<!DOCTYPE html>
<html>

<head>
<title>Buscador de Campeones LoL</title>

<style>

body{
background:#0a0a0f;
color:#d4af37;
font-family:Arial;
text-align:center;
}

input{
padding:10px;
width:300px;
margin-top:20px;
border-radius:5px;
border:none;
}

.container{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
margin-top:40px;
}

.card{
background:#111;
border-radius:10px;
width:250px;
padding:10px;
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.card img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Buscador de Campeones</h1>

<input type="text" id="search" placeholder="Buscar campeón...">

<div class="container" id="champions">

<div class="card">
<h2>Rengar</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Rengar_0.jpg">
</div>

<div class="card">
<h2>Kayn</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Kayn_0.jpg">
</div>

<div class="card">
<h2>Kassadin</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Kassadin_0.jpg">
</div>

<div class="card">
<h2>Volibear</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Volibear_0.jpg">
</div>

</div>

<script>

const search = document.getElementById("search");
const cards = document.querySelectorAll(".card");

search.addEventListener("keyup", function(){

let text = search.value.toLowerCase();

cards.forEach(function(card){

let name = card.innerText.toLowerCase();

if(name.includes(text)){
card.style.display="block";
}else{
card.style.display="none";
}

});

});

</script>

</body>

</html>
