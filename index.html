<!DOCTYPE html>
<html>

<head>
<title>Mi web de League of Legends</title>

<style>

body{
background:#0a0a0f;
color:#d4af37;
font-family:Impact, Haettenschweiler, 'Arial Narrow Bold', sans-serif;
text-align:center;
}

h1{
margin-top:30px;
}

.container{
display:flex;
justify-content:center;
gap:30px;
margin-top:40px;
}

.card{
background:#111;
border-radius:10px;
width:300px;
padding:15px;
box-shadow:0 0 10px rgba(0,0,0,0.8);
transition:0.3s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 20px gold;
}

.card img{
width:100%;
border-radius:8px;
}

</style>

</head>

<body>

<h1>Mis campeones favoritos</h1>

<div class="container">

<div class="card">
<h2>Rengar</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Rengar_0.jpg">
<p>El cazador definitivo de la jungla.</p>
</div>

<div class="card">
<h2>Kayn</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Kayn_0.jpg">
<p>Asesino que domina la sombra.</p>
</div>

<div class="card">
<h2>Volibear</h2>
<img src="https://ddragon.leagueoflegends.com/cdn/img/champion/splash/Volibear_0.jpg">
<p>El dios del trueno de Freljord.</p>
</div>

</div>

</body>

</html>
